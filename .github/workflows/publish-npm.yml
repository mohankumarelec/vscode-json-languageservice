# Publishes @mohankumarelec/vscode-json-languageservice to the public npm registry (registry.npmjs.org).
#
# Required GitHub secret (repo: Settings → Secrets and variables → Actions):
#   NPM_TOKEN — npm automation token with permission to publish to the @mohankumarelec org
#   (create at https://www.npmjs.com/settings/~/tokens — "Granular access token" with
#   Packages read/write for scope @mohankumarelec, or a classic token with publish rights).

name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - run: npm ci
      - run: npm test

      - name: Scope package for npm (@mohankumarelec)
        run: |
          npm pkg set "name=@mohankumarelec/vscode-json-languageservice"
          npm pkg set "publishConfig.access=public"

      - name: Publish to npm
        uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_TOKEN }}
          provenance: true
          package: .
